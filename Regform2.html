<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register New Migrant Worker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .modal {
            background: white;
            border-radius: 16px;
            width: 100%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            position: relative;
        }

        .modal-header {
            padding: 24px 32px;
            border-bottom: 1px solid #e1e5e9;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f9fa;
            border-radius: 16px 16px 0 0;
        }

        .modal-title {
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #7f8c8d;
            padding: 4px;
            border-radius: 4px;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #2c3e50;
        }

        .form-container {
            padding: 32px;
        }

        .form-section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 2px solid #3498db;
        }

        .form-row {
            display: grid;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-row.two-col {
            grid-template-columns: 1fr 1fr;
        }

        .form-row.three-col {
            grid-template-columns: 1fr 1fr 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-label {
            font-weight: 500;
            margin-bottom: 6px;
            color: #2c3e50;
            font-size: 14px;
        }

        .required {
            color: #e74c3c;
        }

        .form-input,
        .form-select,
        .form-textarea {
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
            background: white;
            font-family: inherit;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-select {
            cursor: pointer;
        }

        .gender-options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 6px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
        }

        .radio-item input {
            margin-right: 8px;
            cursor: pointer;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 6px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
        }

        .checkbox-item input {
            margin-right: 8px;
            cursor: pointer;
        }

        .form-footer {
            padding: 24px 32px;
            border-top: 1px solid #e1e5e9;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            background: #f8f9fa;
            border-radius: 0 0 16px 16px;
        }

        .btn-cancel {
            padding: 12px 24px;
            border: 1px solid #ddd;
            background: white;
            color: #666;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        .btn-cancel:hover {
            background: #f8f9fa;
        }

        .btn-submit {
            padding: 12px 24px;
            border: none;
            background: #2c3e50;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        .btn-submit:hover {
            background: #34495e;
        }

        /* Responsive Design */
        @media (max-width: 768px) {

            .form-row.two-col,
            .form-row.three-col {
                grid-template-columns: 1fr;
            }

            .form-container {
                padding: 24px 20px;
            }

            .modal-header {
                padding: 20px;
            }

            .form-footer {
                padding: 20px;
                flex-direction: column;
            }

            .btn-cancel,
            .btn-submit {
                width: 100%;
                justify-content: center;
            }
        }

        /* Input placeholder styling */
        .form-input::placeholder {
            color: #999;
            font-style: italic;
        }

        /* Select styling for better appearance */
        .form-select option {
            padding: 8px;
        }

        /* Focus states for better accessibility */
        .radio-item input:focus,
        .checkbox-item input:focus {
            outline: 2px solid #3498db;
            outline-offset: 2px;
        }
    </style>
</head>

<body>
    <div class="modal">
        <div class="modal-header">
            <h2 class="modal-title">Register New Migrant Worker</h2>
            <button class="close-btn" onclick="closeForm()">&times;</button>
        </div>

        <form id="migrantWorkerForm" class="form-container">
            <!-- Personal Information -->
            <div class="form-section">
                <h3 class="section-title">Personal Information</h3>
                <div class="form-row two-col">
                    <div class="form-group">
                        <label class="form-label">Full Name <span class="required">*</span></label>
                        <input type="text" name="fullName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Date of Birth <span class="required">*</span></label>
                        <input type="date" name="dateOfBirth" class="form-input" required>
                    </div>
                </div>
                <div class="form-row two-col">
                    <div class="form-group">
                        <label class="form-label">Gender <span class="required">*</span></label>
                        <div class="gender-options">
                            <label class="radio-item">
                                <input type="radio" name="gender" value="male" required>
                                Male
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="gender" value="female" required>
                                Female
                            </label>
                            <label class="radio-item">
                                <input type="radio" name="gender" value="other" required>
                                Other
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Father's Name</label>
                        <input type="text" name="fatherName" class="form-input">
                    </div>
                </div>
            </div>

            <!-- Contact Information -->
            <div class="form-section">
                <h3 class="section-title">Contact Information</h3>
                <div class="form-row two-col">
                    <div class="form-group">
                        <label class="form-label">Mobile Number <span class="required">*</span></label>
                        <input type="tel" name="mobileNumber" class="form-input" pattern="[0-9]{10}" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" name="emailAddress" class="form-input">
                    </div>
                </div>
            </div>

            <!-- Address Information -->
            <div class="form-section">
                <h3 class="section-title">Address Information</h3>
                <div class="form-row two-col">
                    <div class="form-group">
                        <label class="form-label">Home State <span class="required">*</span></label>
                        <select name="homeState" class="form-select" required>
                            <option value="">Select State</option>
                            <option value="andhra-pradesh">Andhra Pradesh</option>
                            <option value="arunachal-pradesh">Arunachal Pradesh</option>
                            <option value="assam">Assam</option>
                            <option value="bihar">Bihar</option>
                            <option value="chhattisgarh">Chhattisgarh</option>
                            <option value="goa">Goa</option>
                            <option value="gujarat">Gujarat</option>
                            <option value="haryana">Haryana</option>
                            <option value="himachal-pradesh">Himachal Pradesh</option>
                            <option value="jharkhand">Jharkhand</option>
                            <option value="karnataka">Karnataka</option>
                            <option value="kerala">Kerala</option>
                            <option value="madhya-pradesh">Madhya Pradesh</option>
                            <option value="maharashtra">Maharashtra</option>
                            <option value="manipur">Manipur</option>
                            <option value="meghalaya">Meghalaya</option>
                            <option value="mizoram">Mizoram</option>
                            <option value="nagaland">Nagaland</option>
                            <option value="odisha">Odisha</option>
                            <option value="punjab">Punjab</option>
                            <option value="rajasthan">Rajasthan</option>
                            <option value="sikkim">Sikkim</option>
                            <option value="tamil-nadu">Tamil Nadu</option>
                            <option value="telangana">Telangana</option>
                            <option value="tripura">Tripura</option>
                            <option value="uttar-pradesh">Uttar Pradesh</option>
                            <option value="uttarakhand">Uttarakhand</option>
                            <option value="west-bengal">West Bengal</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Home District</label>
                        <input type="text" name="homeDistrict" class="form-input">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Home Address</label>
                        <textarea name="homeAddress" class="form-textarea" rows="3"></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Current Address in Kerala</label>
                        <textarea name="currentAddress" class="form-textarea" rows="3"></textarea>
                    </div>
                </div>
            </div>

            <!-- Employment Information -->
            <div class="form-section">
                <h3 class="section-title">Employment Information</h3>
                <div class="form-row two-col">
                    <div class="form-group">
                        <label class="form-label">Occupation <span class="required">*</span></label>
                        <select name="occupation" class="form-select" required>
                            <option value="">Select Occupation</option>
                            <option value="construction-worker">Construction Worker</option>
                            <option value="domestic-worker">Domestic Worker</option>
                            <option value="factory-worker">Factory Worker</option>
                            <option value="agricultural-worker">Agricultural Worker</option>
                            <option value="security-guard">Security Guard</option>
                            <option value="driver">Driver</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Employer/Company</label>
                        <input type="text" name="employer" class="form-input">
                    </div>
                </div>
            </div>

            <!-- Identity Documents -->
            <div class="form-section">
                <h3 class="section-title">Identity Documents</h3>
                <div class="form-row two-col">
                    <div class="form-group">
                        <label class="form-label">Aadhaar Number <span class="required">*</span></label>
                        <input type="text" name="aadhaarNumber" class="form-input" placeholder="XXXX XXXX XXXX"
                            maxlength="14" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">PAN Number</label>
                        <input type="text" name="panNumber" class="form-input" placeholder="ABCDE1234F" maxlength="10"
                            pattern="[A-Z]{5}[0-9]{4}[A-Z]{1}">
                    </div>
                </div>
            </div>

            <!-- Emergency Contact -->
            <div class="form-section">
                <h3 class="section-title">Emergency Contact</h3>
                <div class="form-row three-col">
                    <div class="form-group">
                        <label class="form-label">Contact Name <span class="required">*</span></label>
                        <input type="text" name="emergencyContactName" class="form-input" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Relationship</label>
                        <input type="text" name="emergencyContactRelation" class="form-input"
                            placeholder="e.g., Father, Brother">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Contact Number <span class="required">*</span></label>
                        <input type="tel" name="emergencyContactNumber" class="form-input" pattern="[0-9]{10}" required>
                    </div>
                </div>
            </div>

            <!-- Health Information -->
            <div class="form-section">
                <h3 class="section-title">Health Information</h3>
                <div class="form-row two-col">
                    <div class="form-group">
                        <label class="form-label">Blood Group</label>
                        <select name="bloodGroup" class="form-select">
                            <option value="">Select Blood Group</option>
                            <option value="a-positive">A+</option>
                            <option value="a-negative">A-</option>
                            <option value="b-positive">B+</option>
                            <option value="b-negative">B-</option>
                            <option value="ab-positive">AB+</option>
                            <option value="ab-negative">AB-</option>
                            <option value="o-positive">O+</option>
                            <option value="o-negative">O-</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Known Allergies</label>
                        <div class="checkbox-group">
                            <label class="checkbox-item">
                                <input type="checkbox" name="allergies" value="food"> Food
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="allergies" value="drug"> Drug
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" name="allergies" value="environmental"> Environmental
                            </label>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Medical History</label>
                        <textarea name="medicalHistory" class="form-textarea"
                            placeholder="Previous illnesses, surgeries, conditions" rows="3"></textarea>
                    </div>
                </div>
            </div>
        </form>

        <div class="form-footer">
            <button type="button" class="btn-cancel" onclick="closeForm()">Cancel</button>
            <button type="submit" class="btn-submit" form="migrantWorkerForm">Register Worker</button>
        </div>
    </div>

    <script>
        function closeForm() {
            if (confirm('Are you sure you want to close? All data will be lost.')) {
                window.close();
            }
        }

        // Form submission handler
        document.getElementById('migrantWorkerForm').addEventListener('submit', function (e) {
            e.preventDefault();

            // Collect form data
            const formData = new FormData(this);
            const workerData = {};

            // Convert FormData to object
            for (let [key, value] of formData.entries()) {
                if (workerData[key]) {
                    // Handle multiple values (like allergies checkboxes)
                    if (Array.isArray(workerData[key])) {
                        workerData[key].push(value);
                    } else {
                        workerData[key] = [workerData[key], value];
                    }
                } else {
                    workerData[key] = value;
                }
            }

            console.log('Worker Registration Data:', workerData);
            alert('Worker registration submitted successfully!');

            // Reset form
            this.reset();
        });

        // Aadhaar number formatting
        document.querySelector('input[name="aadhaarNumber"]').addEventListener('input', function (e) {
            let value = e.target.value.replace(/\s/g, '').replace(/[^\d]/g, '');
            let formattedValue = value.match(/.{1,4}/g)?.join(' ') || value;
            if (formattedValue.length > 14) formattedValue = formattedValue.substr(0, 14);
            e.target.value = formattedValue;
        });

        // PAN number formatting
        document.querySelector('input[name="panNumber"]').addEventListener('input', function (e) {
            e.target.value = e.target.value.toUpperCase();
        });

        // Phone number validation
        document.querySelectorAll('input[type="tel"]').forEach(input => {
            input.addEventListener('input', function (e) {
                e.target.value = e.target.value.replace(/[^\d]/g, '');
            });
        });
    </script>
</body>

</html>
